name: Bug report
description: Report a reproducible problem without uploading private Agent data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Never attach real Agent histories, captures, API keys, certificates, prompts, tool output, or exported Sessions. Reduce the issue to a synthetic fixture.
  - type: dropdown
    id: surface
    attributes:
      label: Affected area
      options:
        - Live Capture / Gateway
        - Session Explorer / Import
        - Terminal
        - Replay & Diagnostics
        - Claude Code adapter
        - Codex CLI adapter
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, and Agent/API client version.
      placeholder: Windows 11, Node 22.x, Codex CLI x.y.z
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction with synthetic data
      description: Provide the smallest safe steps or synthetic fixture that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed real prompts, responses, tool data, credentials, local usernames, and private paths.
          required: true
