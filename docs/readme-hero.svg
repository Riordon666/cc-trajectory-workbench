<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Agent Trace Workbench</title>
  <desc id="desc">Local-first observability and replay debugger for coding agents</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="0.48" stop-color="#f8f0fa"/>
      <stop offset="1" stop-color="#fff3e4"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#5b9bd5"/>
      <stop offset="0.38" stop-color="#e891b5"/>
      <stop offset="0.7" stop-color="#5eaaa8"/>
      <stop offset="1" stop-color="#f29a3f"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#376f9e"/>
      <stop offset="0.52" stop-color="#8c5f91"/>
      <stop offset="1" stop-color="#b86c2f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#655772" flood-opacity=".14"/>
    </filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="104" cy="70" r="126" fill="#83c7ef" opacity=".16"/>
  <circle cx="1080" cy="292" r="180" fill="#f4a6c5" opacity=".14"/>
  <circle cx="955" cy="28" r="82" fill="#ffd59f" opacity=".18"/>
  <path d="M0 302 C220 252 350 365 570 310 S910 250 1200 320 V360 H0Z" fill="#fff" opacity=".34"/>

  <g opacity=".48" fill="#fff">
    <path d="M78 52l4 11 11 4-11 4-4 11-4-11-11-4 11-4z"/>
    <path d="M1120 92l3 8 8 3-8 3-3 8-3-8-8-3 8-3z"/>
    <circle cx="1030" cy="70" r="4"/>
    <circle cx="154" cy="287" r="5"/>
  </g>

  <g text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">
    <text x="600" y="92" font-size="16" font-weight="700" letter-spacing="4" fill="#63758c">LOCAL-FIRST · PRIVATE · OPEN SOURCE</text>
    <text x="600" y="154" font-size="46" font-weight="800" fill="url(#titleGradient)">Agent Trace Workbench</text>
    <text x="600" y="190" font-size="18" fill="#687080">Observe the run. Replay the session. Debug the agent.</text>
  </g>

  <g transform="translate(194 232)" filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <rect width="812" height="84" rx="20" fill="#fff" opacity=".82" stroke="#fff"/>
    <path d="M92 42H720" stroke="url(#line)" stroke-width="4" stroke-linecap="round" opacity=".42"/>

    <g transform="translate(70 18)">
      <circle cx="24" cy="24" r="24" fill="#dcecf9"/>
      <circle cx="24" cy="24" r="8" fill="#5b9bd5"/>
      <text x="24" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#3a7cb8">CAPTURE</text>
    </g>
    <g transform="translate(282 18)">
      <circle cx="24" cy="24" r="24" fill="#f8e1ec"/>
      <path d="M16 18h16M16 24h16M16 30h10" stroke="#c66a96" stroke-width="3" stroke-linecap="round"/>
      <text x="24" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#c66a96">EXPLORE</text>
    </g>
    <g transform="translate(494 18)">
      <circle cx="24" cy="24" r="24" fill="#d9f0ed"/>
      <path d="M15 18l7 6-7 6M25 31h10" fill="none" stroke="#3d8a88" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="24" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#3d8a88">TERMINAL</text>
    </g>
    <g transform="translate(706 18)">
      <circle cx="24" cy="24" r="24" fill="#ffe7ca"/>
      <path d="M15 26a10 10 0 101-8M15 16v8h8" fill="none" stroke="#cf6f1f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="24" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#cf6f1f">REPLAY</text>
    </g>

    <g fill="#fff" opacity=".95">
      <circle cx="200" cy="42" r="6"/><circle cx="412" cy="42" r="6"/><circle cx="624" cy="42" r="6"/>
    </g>
  </g>

  <rect x="1" y="1" width="1198" height="358" rx="27" fill="none" stroke="#fff" stroke-opacity=".74" stroke-width="2"/>
</svg>
